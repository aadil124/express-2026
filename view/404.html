<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 120px;
      margin: 0;
    }

    h2 {
      margin: 10px 0;
      font-weight: normal;
    }

    p {
      margin: 20px 0;
    }

    a {
      text-decoration: none;
      background: #fff;
      color: #ff7e5f;
      padding: 12px 25px;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="/">Go Back Home</a>
  </div>

</body>
</html>
